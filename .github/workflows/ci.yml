name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    with:
      submodules: recursive

    steps:
      - uses: actions/checkout@v6

      - name: Install devbox + Nix + devbox.json packages
        uses: jetify-com/devbox-install-action@v0.12.0

      - name: Sanity check
        run: devbox list

      - name: clang-check
        run: devbox run -- just check
